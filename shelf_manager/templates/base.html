<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}VitroShelf{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: {
          paper:'#0a0f1e', surface:'#111827', ink:'#f1f5f9', muted:'#94a3b8',
          line:'#1e3a5f', clay:{DEFAULT:'#38bdf8', hover:'#0ea5e9'},
          st:{ healthy:'#22c55e', contam:'#f59e0b', dead:'#ef4444',
               unknown:'#64748b', empty:'#1e293b' },
          // legacy aliases
          healthy:'#22c55e', contaminated:'#f59e0b', dead:'#ef4444', unknown:'#64748b',
        },
        fontFamily: { serif:['Fraunces','Georgia','serif'], sans:['Inter','system-ui','sans-serif'] },
        boxShadow: { soft:'0 1px 2px rgba(0,0,0,.3), 0 1px 3px rgba(0,0,0,.2)' },
      } },
    }
  </script>
</head>
<body class="bg-paper text-ink min-h-screen font-sans pb-20 md:pb-0" style="-webkit-font-smoothing:antialiased">

  <!-- Top nav (desktop) -->
  <nav id="topnav" class="bg-surface/80 backdrop-blur border-b border-line px-5 py-3 flex items-center gap-5 sticky top-0 z-30">
    <a href="/" class="font-serif text-ink font-semibold text-lg tracking-tight">🌱 VitroShelf</a>
    <a href="/shelf/S01" class="text-muted hover:text-ink transition text-sm hidden md:block">ชั้น S01</a>
    <a href="/shelf/S02" class="text-muted hover:text-ink transition text-sm hidden md:block">ชั้น S02</a>
    <a href="/train" class="text-muted hover:text-ink transition text-sm hidden md:block">🧠 Train Model</a>
    <a href="/scan" class="text-muted hover:text-ink transition text-sm hidden md:block">📷 Scanner</a>
    <a href="/analytics" class="text-muted hover:text-ink transition text-sm hidden md:block">📈 Analytics</a>
    <a href="/import" class="text-muted hover:text-ink transition text-sm hidden md:block">📥 Import</a>
  </nav>

  <!-- ML loading banner -->
  <div id="ml-banner" style="display:none;background:#0f172a;border-bottom:1px solid #1e3a5f;padding:6px 16px;font-size:12px;color:#94a3b8;display:flex;align-items:center;gap:8px">
    <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#38bdf8;animation:pulse 1s infinite"></span>
    <span id="ml-banner-text">กำลังโหลด ML modules (torch, timm)... Train และ Scanner ยังไม่พร้อม</span>
  </div>
  <style>
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    #topnav a.nav-active { color:#f1f5f9 !important; font-weight:500; position:relative; }
    #topnav a.nav-active::after {
      content:''; position:absolute; bottom:-13px; left:0; right:0;
      height:2px; background:#38bdf8; border-radius:1px;
    }
    #bottomnav a.nav-active { color:#38bdf8 !important; }
    #bottomnav a.nav-active span.text-xl { filter:saturate(1.3); }
  </style>
  <script>
  (function(){
    function check(){
      fetch('/api/ml_status').then(r=>r.json()).then(d=>{
        const b = document.getElementById('ml-banner');
        if(d.ready){
          b.style.display='none';
        } else {
          b.style.display='flex';
          setTimeout(check, 2000);
        }
      }).catch(()=>setTimeout(check,2000));
    }
    check();
  })();
  </script>

  <main class="px-4 py-5 max-w-7xl mx-auto">
    {% block content %}{% endblock %}
  </main>

  <!-- Bottom nav (mobile) -->
  <nav id="bottomnav" class="md:hidden fixed bottom-0 left-0 right-0 bg-surface border-t border-line flex justify-around py-2 z-40">
    <a href="/" class="flex flex-col items-center gap-0.5 text-muted hover:text-clay px-4 py-1">
      <span class="text-xl">📊</span>
      <span class="text-xs">Dashboard</span>
    </a>
    <a href="/shelf/S01" class="flex flex-col items-center gap-0.5 text-muted hover:text-clay px-4 py-1">
      <span class="text-xl">🗄️</span>
      <span class="text-xs">S01</span>
    </a>
    <a href="/shelf/S02" class="flex flex-col items-center gap-0.5 text-muted hover:text-clay px-4 py-1">
      <span class="text-xl">🗄️</span>
      <span class="text-xs">S02</span>
    </a>
    <a href="/train" class="flex flex-col items-center gap-0.5 text-muted hover:text-clay px-4 py-1">
      <span class="text-xl">🧠</span>
      <span class="text-xs">Train</span>
    </a>
    <a href="/scan" class="flex flex-col items-center gap-0.5 text-muted hover:text-clay px-4 py-1">
      <span class="text-xl">📷</span>
      <span class="text-xs">Scan</span>
    </a>
    <a href="/analytics" class="flex flex-col items-center gap-0.5 text-muted hover:text-clay px-4 py-1">
      <span class="text-xl">📈</span>
      <span class="text-xs">Analytics</span>
    </a>
    <a href="/import" class="flex flex-col items-center gap-0.5 text-muted hover:text-clay px-4 py-1">
      <span class="text-xl">📥</span>
      <span class="text-xs">Import</span>
    </a>
  </nav>

  <script>
  (function(){
    var p = location.pathname;
    document.querySelectorAll('#topnav a[href], #bottomnav a[href]').forEach(function(a){
      var h = a.getAttribute('href');
      if (!h) return;
      var active = (h === '/') ? (p === '/') : (p === h || p.startsWith(h + '/'));
      if (active) a.classList.add('nav-active');
    });
  })();
  </script>
</body>
</html>
